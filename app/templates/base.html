<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloodAlert{% block title %}{% endblock %}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
nav { background: #1e293b; padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; border-bottom: 1px solid #334155; }
nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
nav a:hover { color: #38bdf8; }
nav .brand { color: #38bdf8; font-weight: 700; font-size: 1.1rem; }
nav .spacer { flex: 1; }
.container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 1.25rem; margin-bottom: 1rem; }
.card h2 { font-size: 1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
.badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
.badge-normal { background: #166534; color: #86efac; }
.badge-advisory { background: #854d0e; color: #fde68a; }
.badge-warning { background: #9a3412; color: #fed7aa; }
.badge-evacuate { background: #991b1b; color: #fecaca; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }
#map { height: 450px; border-radius: 0.5rem; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td { text-align: left; padding: 0.6rem 0.5rem; border-bottom: 1px solid #334155; }
th { color: #64748b; font-weight: 600; }
tr:hover td { background: #334155; }
input:focus, button:focus { outline: 2px solid #38bdf8; outline-offset: 2px; }
</style>
</head>
<body>
<nav>
  <span class="brand">FloodAlert</span>
  <a href="/">Dashboard</a>
  <a href="/communities">Communities</a>
  <span class="spacer"></span>
  {% if is_admin %}
  <a href="/admin">Admin</a>
  <a href="/logout">Logout</a>
  {% else %}
  <a href="/login">Login</a>
  {% endif %}
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
