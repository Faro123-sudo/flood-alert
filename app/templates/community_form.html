{% extends "base.html" %}
{% block title %} — {{ "Edit" if community else "New" }} Community{% endblock %}
{% block content %}

<div style="margin-bottom:1rem;">
  <a href="/admin" style="color:#64748b; text-decoration:none;">&larr; Admin</a>
</div>

<div style="max-width:600px;">
  <div class="card">
    <h2>{{ "Edit" if community else "New" }} Community</h2>

    {% if not community %}
    <div style="margin-bottom:1.25rem; position:relative;">
      <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Search for a place (Nigeria)</label>
      <input type="text" id="place-search" placeholder="e.g. Lokoja, Warri, Owerri..."
        autocomplete="off"
        style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
      <div id="search-results" style="display:none; position:absolute; z-index:10; left:0; right:0;
        background:#1e293b; border:1px solid #334155; border-radius:0.375rem; max-height:240px; overflow-y:auto;"></div>
    </div>
    {% endif %}

    <form method="POST" action="{{ '/admin/communities/%d/edit' % community.id if community else '/admin/communities/new' }}">
      <div style="margin-bottom:1rem;">
        <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Name</label>
        <input type="text" name="name" id="f-name" value="{{ community.name if community else '' }}" required
          style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Latitude</label>
          <input type="number" step="any" name="lat" id="f-lat" value="{{ community.lat if community else '' }}" required
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Longitude</label>
          <input type="number" step="any" name="lon" id="f-lon" value="{{ community.lon if community else '' }}" required
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Bank height (m)</label>
          <input type="number" step="any" name="bank_height_m" value="{{ community.bank_height_m if community else 5.0 }}"
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Rain→rise ratio</label>
          <input type="number" step="any" name="rain_to_rise_ratio" value="{{ community.rain_to_rise_ratio if community else 0.02 }}"
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Contact phones (comma-separated)</label>
        <input type="text" name="contact_phones" value="{{ community.contact_phones if community else '' }}"
          style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
      </div>
      <button type="submit"
        style="padding:0.6rem 1.5rem; background:#2563eb; color:#fff; border:none; border-radius:0.375rem; cursor:pointer;">
        {{ "Save" if community else "Create" }}
      </button>
    </form>
  </div>
</div>

{% if not community %}
<script>
(function() {
  const input = document.getElementById('place-search');
  const dropdown = document.getElementById('search-results');
  let timer = null;

  input.addEventListener('input', function() {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) { dropdown.style.display = 'none'; return; }
    timer = setTimeout(async () => {
      try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
        const results = await resp.json();
        if (!results.length) { dropdown.style.display = 'none'; return; }
        dropdown.innerHTML = results.map((r, i) =>
          '<div data-idx="' + i + '" style="padding:0.6rem 0.75rem; cursor:pointer; border-bottom:1px solid #334155; color:#e2e8f0; font-size:0.9rem;">' +
          '<strong>' + r.name + '</strong><br><span style="color:#94a3b8; font-size:0.8rem;">' + r.display + '</span></div>'
        ).join('');
        dropdown.style.display = 'block';
        dropdown.querySelectorAll('div').forEach(div => {
          div.addEventListener('click', function() {
            const r = results[parseInt(this.dataset.idx)];
            document.getElementById('f-name').value = r.name;
            document.getElementById('f-lat').value = r.lat;
            document.getElementById('f-lon').value = r.lon;
            dropdown.style.display = 'none';
            input.value = r.name;
          });
        });
      } catch(e) { dropdown.style.display = 'none'; }
    }, 400);
  });

  document.addEventListener('click', function(e) {
    if (!dropdown.contains(e.target) && e.target !== input) dropdown.style.display = 'none';
  });
})();
</script>
{% endif %}
{% endblock %}
