{% extends "base.html" %}
{% block title %} — {{ "Edit" if community else "New" }} Community{% endblock %}
{% block content %}

<div style="margin-bottom:1rem;">
  <a href="/admin" style="color:#64748b; text-decoration:none;">&larr; Admin</a>
</div>

<div style="max-width:600px;">
  <div class="card">
    <h2>{{ "Edit" if community else "New" }} Community</h2>
    <form method="POST" action="{{ '/admin/communities/%d/edit' % community.id if community else '/admin/communities/new' }}">
      <div style="margin-bottom:1rem;">
        <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Name</label>
        <input type="text" name="name" value="{{ community.name if community else '' }}" required
          style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Latitude</label>
          <input type="number" step="any" name="lat" value="{{ community.lat if community else '' }}" required
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Longitude</label>
          <input type="number" step="any" name="lon" value="{{ community.lon if community else '' }}" required
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Bank height (m)</label>
          <input type="number" step="any" name="bank_height_m" value="{{ community.bank_height_m if community else 5.0 }}"
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
        <div>
          <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Rain→rise ratio</label>
          <input type="number" step="any" name="rain_to_rise_ratio" value="{{ community.rain_to_rise_ratio if community else 0.02 }}"
            style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
        </div>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; color:#94a3b8; font-size:0.85rem; margin-bottom:0.25rem;">Contact phones (comma-separated)</label>
        <input type="text" name="contact_phones" value="{{ community.contact_phones if community else '' }}"
          style="width:100%; padding:0.6rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0;">
      </div>
      <button type="submit"
        style="padding:0.6rem 1.5rem; background:#2563eb; color:#fff; border:none; border-radius:0.375rem; cursor:pointer;">
        {{ "Save" if community else "Create" }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
