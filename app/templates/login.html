{% extends "base.html" %}
{% block title %} — Login{% endblock %}
{% block content %}
<div style="max-width:400px; margin:4rem auto; text-align:center;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem;">Admin Login</h2>
    {% if error %}
    <div style="background:#991b1b; color:#fecaca; padding:0.75rem; border-radius:0.375rem; margin-bottom:1rem; font-size:0.9rem;">
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="password" name="password" placeholder="Password" required
        style="width:100%; padding:0.75rem; background:#0f172a; border:1px solid #334155; border-radius:0.375rem; color:#e2e8f0; font-size:1rem; margin-bottom:1rem;">
      <button type="submit"
        style="width:100%; padding:0.75rem; background:#2563eb; color:#fff; border:none; border-radius:0.375rem; font-size:1rem; cursor:pointer;">
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
